<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b0b0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tabata">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
<title>Tabata Timer</title>
</head>
<body>

<!-- SETTINGS SCREEN -->
<section id="screen-settings" class="screen active">
  <header>
    <h1>Tabata Timer</h1>
    <p class="description">High-intensity interval training timer. Configure your workout or choose from saved presets.</p>
  </header>

  <div id="preset-list" class="preset-list"></div>

  <div class="main-actions">
    <button id="btn-start" type="button" class="primary big">Start Workout</button>
  </div>

  <div class="settings-toggle">
    <button id="btn-toggle-settings" type="button">⚙️ Customize Settings</button>
  </div>

  <div id="settings-panel" class="settings-panel collapsed">
    <div class="preset-bar">
      <select id="preset-select" aria-label="Presets">
        <option value="">-- presets --</option>
      </select>
      <button id="preset-load" type="button">Load</button>
      <button id="preset-delete" type="button" class="danger">Delete</button>
    </div>

    <form id="config-form" autocomplete="off">
      <label>Preset name
        <input type="text" id="cfg-name" placeholder="e.g. Legs 6x8" maxlength="40">
      </label>

      <label>Tabatas per set
        <input type="number" id="cfg-tabatas" min="1" max="30" value="6" inputmode="numeric">
      </label>

      <label>Sets
        <input type="number" id="cfg-sets" min="1" max="30" value="8" inputmode="numeric">
      </label>

      <label>Work seconds
        <input type="number" id="cfg-work" min="5" max="120" value="20" inputmode="numeric">
      </label>

      <label>Rest seconds
        <input type="number" id="cfg-rest" min="3" max="120" value="10" inputmode="numeric">
      </label>

      <label>Between-set rest seconds
        <input type="number" id="cfg-setrest" min="5" max="600" value="30" inputmode="numeric">
      </label>

      <div class="toggles">
        <label class="inline"><input type="checkbox" id="cfg-voice" checked> Voice</label>
        <label class="inline"><input type="checkbox" id="cfg-click" checked> Click</label>
      </div>

      <div class="summary" id="summary"></div>

      <div class="actions">
        <button id="btn-save" type="button">Save preset</button>
        <button id="btn-export" type="button">Export presets</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button id="btn-import" type="button">Import presets</button>
      </div>
    </form>
  </div>
</section>

<!-- WORKOUT SCREEN -->
<section id="screen-workout" class="screen">
  <div class="phase-label" id="phase-label">READY</div>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 200 200" aria-hidden="true">
      <circle class="ring-track" cx="100" cy="100" r="92"></circle>
      <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="92"
              stroke-dasharray="578" stroke-dashoffset="0"></circle>
    </svg>
    <div class="count" id="count">0</div>
  </div>

  <div class="meta">
    <div>Rep <span id="meta-rep">0</span> / <span id="meta-reps">0</span></div>
    <div>Set <span id="meta-set">0</span> / <span id="meta-sets">0</span></div>
  </div>

  <div class="workout-progress">
    <div class="progress-top">
      <span id="overall-percent">0%</span>
      <span id="next-label">Up next: —</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="actions workout-actions">
    <button id="btn-pause" type="button">Pause</button>
    <button id="btn-skip"  type="button">Skip</button>
    <button id="btn-stop"  type="button" class="danger">Stop</button>
  </div>
</section>

<script type="module" src="js/app.js"></script>
</body>
</html>
